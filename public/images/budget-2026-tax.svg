<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBudget" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00205b"/>
      <stop offset="100%" stop-color="#003d8f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bgBudget)"/>
  <rect width="800" height="4" fill="#ffcd00"/>

  <!-- Eyebrow -->
  <rect x="63" y="72" width="140" height="24" rx="4" fill="rgba(255,205,0,0.15)"/>
  <text x="73" y="89" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#ffcd00" letter-spacing="1.5">FEDERAL BUDGET 2026</text>

  <!-- Headline -->
  <text x="60" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-2">Tax Changes</text>
  <text x="60" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#ffcd00" letter-spacing="-2">2026–27</text>
  <text x="63" y="243" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">What the budget means for your take-home pay</text>

  <!-- Stat cards -->
  <rect x="63" y="272" width="148" height="72" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="83" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="white">$1,000</text>
  <text x="83" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">std. work deduction</text>

  <rect x="223" y="272" width="148" height="72" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="243" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="#ffcd00">12%</text>
  <text x="243" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">super guarantee</text>

  <rect x="383" y="272" width="148" height="72" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="403" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="white">30%</text>
  <text x="403" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">mid-income tax rate</text>

  <!-- Right: simplified bar chart representing take-home pay improvement -->
  <text x="630" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.35)" text-anchor="middle">TAKE-HOME PAY</text>
  <!-- 2024-25 bar -->
  <rect x="590" y="120" width="22" height="180" rx="4" fill="rgba(255,255,255,0.12)"/>
  <text x="601" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">24–25</text>
  <!-- 2025-26 bar -->
  <rect x="624" y="108" width="22" height="192" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="635" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle">25–26</text>
  <!-- 2026-27 bar (tallest — extra deduction) -->
  <rect x="658" y="88" width="22" height="212" rx="4" fill="#ffcd00"/>
  <text x="669" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">26–27</text>

  <!-- Up arrow on 26-27 bar -->
  <polyline points="669,76 669,60 669,76" stroke="#ffcd00" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="662,68 669,60 676,68" stroke="#ffcd00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Footer -->
  <text x="60" y="418" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">12 May 2026 · Subject to legislation passing Parliament</text>

  <rect y="446" width="800" height="4" fill="#ffcd00"/>
</svg>
