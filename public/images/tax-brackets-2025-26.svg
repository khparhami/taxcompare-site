<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00205b"/>
      <stop offset="100%" stop-color="#003d8f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg1)"/>
  <rect width="800" height="4" fill="#ffcd00"/>

  <!-- Header -->
  <text x="60" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="-0.5">2025–26 Income Tax Brackets</text>
  <text x="60" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Australian Residents · Marginal Rate on Each Dollar</text>

  <!-- Row 1: 0% -->
  <text x="60" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="11.5" fill="rgba(255,255,255,0.55)">$0 – $18,200</text>
  <rect x="60" y="112" width="540" height="34" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="60" y="112" width="4" height="34" rx="2" fill="#ffcd00"/>
  <text x="75" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12.5" font-weight="500" fill="rgba(255,255,255,0.4)">Tax-free threshold — 0%</text>

  <!-- Row 2: 16% -->
  <text x="60" y="167" font-family="system-ui,-apple-system,sans-serif" font-size="11.5" fill="rgba(255,255,255,0.55)">$18,201 – $45,000</text>
  <rect x="60" y="172" width="540" height="34" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="60" y="172" width="192" height="34" rx="4" fill="#60a5fa"/>
  <text x="264" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">16%</text>

  <!-- Row 3: 30% -->
  <text x="60" y="227" font-family="system-ui,-apple-system,sans-serif" font-size="11.5" fill="rgba(255,255,255,0.55)">$45,001 – $135,000</text>
  <rect x="60" y="232" width="540" height="34" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="60" y="232" width="360" height="34" rx="4" fill="#3b82f6"/>
  <text x="432" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">30%</text>

  <!-- Row 4: 37% -->
  <text x="60" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="11.5" fill="rgba(255,255,255,0.55)">$135,001 – $190,000</text>
  <rect x="60" y="292" width="540" height="34" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="60" y="292" width="444" height="34" rx="4" fill="#2563eb"/>
  <text x="516" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">37%</text>

  <!-- Row 5: 45% -->
  <text x="60" y="347" font-family="system-ui,-apple-system,sans-serif" font-size="11.5" fill="rgba(255,255,255,0.55)">$190,001 and over</text>
  <rect x="60" y="352" width="540" height="34" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="60" y="352" width="540" height="34" rx="4" fill="#0072ce"/>
  <text x="612" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white">45%</text>

  <!-- Footer -->
  <text x="60" y="418" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Plus 2% Medicare Levy for residents · LITO reduces tax for incomes under $66,667</text>

  <rect y="446" width="800" height="4" fill="#ffcd00"/>
</svg>
